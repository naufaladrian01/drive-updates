<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
font-family:Arial, sans-serif;
background:#f5f5f5;
padding:10px;
}

h3{
text-align:center;
}

#comments{
max-width:500px;
margin:auto;
}

.comment-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:12px;
}

.comment-name{
font-weight:bold;
margin-bottom:5px;
}

.comment-rating{
color:#f4b400;
margin-bottom:5px;
}

.comment-text{
font-size:14px;
}

</style>

</head>

<body>

<h3>Komentar Pengguna</h3>

<div id="comments"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQVcYZu3iTM5xqZZUXev-OtcR6BGhbhf0TwGa4QWRhEBEF5H3OmKJ4MdmpSyj6h8C9WX7AvPBEWc2Yt/pubhtml/pub?output=csv";

fetch(SHEET_URL)
.then(response => response.text())
.then(data => {

const rows = data.split("\n").slice(1);

let html = "";

rows.reverse().slice(0,6).forEach(row => {

const cols = row.split(",");

const nama = cols[1];
const rating = cols[3];
const komentar = cols[4];

if(!nama || !komentar) return;

html += `

<div class="comment-card">

<div class="comment-name">
👤 ${nama}
</div>

<div class="comment-rating">
⭐ ${rating}
</div>

<div class="comment-text">
${komentar}
</div>

</div>

`;

});

document.getElementById("comments").innerHTML = html;

});

</script>

</body>
</html>
