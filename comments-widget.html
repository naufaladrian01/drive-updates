<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
padding:0;
background:transparent;
font-family:Arial, sans-serif;
}

.widget{
max-width:450px;
margin:auto;
}

.title{
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.comment{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:10px;
}

.name{
font-weight:bold;
margin-bottom:4px;
}

.rating{
color:#f4b400;
font-size:14px;
}

.text{
font-size:13px;
}

</style>

</head>

<body>

<div class="widget">

<div class="title">Komentar Pengguna</div>

<div id="comments"></div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVcYZu3iTM5xqZZUXev-OtcR6BGhbhf0TwGa4QWRhEBEF5H3OmKJ4MdmpSyj6h8C9WX7AvPBEWc2Yt/pubhtml/pub?output=csv";

fetch(SHEET_URL)
.then(r => r.text())
.then(data => {

const rows = data.split("\n").slice(1);
let html="";

rows.reverse().slice(0,5).forEach(row=>{

const col = row.split(",");

const nama = col[1];
const rating = col[3];
const komentar = col[4];

if(!nama || !komentar) return;

html += `
<div class="comment">
<div class="name">👤 ${nama}</div>
<div class="rating">⭐ ${rating}</div>
<div class="text">${komentar}</div>
</div>
`;

});

document.getElementById("comments").innerHTML = html;

});

</script>

</body>
</html>
