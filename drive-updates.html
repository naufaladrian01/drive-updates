<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:10px;
background:#f5f5f5;
}

#driveUpdates{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:10px;
font-size:14px;
}

a{
text-decoration:none;
color:#333;
}

</style>

</head>

<body>

<h3 style="text-align:center">Recent Updates</h3>

<div id="driveUpdates"></div>

<script>

const API_KEY = "AIzaSyAm1XgmFz2loEuBtfYb6778gwuFKhh8z-k";
const FOLDER_ID = "1MIE35z9EfbaacVMQLgyf6WaLPYctBOFs";

const url =
`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&fields=files(id,name,mimeType,thumbnailLink,createdTime)&orderBy=createdTime desc&key=${API_KEY}`;

fetch(url)
.then(res => res.json())
.then(data => {

let html = "";

data.files.slice(0,8).forEach(file => {

let icon = "📄";

if(file.mimeType === "application/vnd.google-apps.folder"){
icon = "📁";
}

let thumb = file.thumbnailLink
? `<img src="${file.thumbnailLink}">`
: `<div style="height:120px;display:flex;align-items:center;justify-content:center;font-size:40px">${icon}</div>`;

html += `
<div class="card">

<a href="https://drive.google.com/open?id=${file.id}" target="_blank">

${thumb}

<div class="card-title">
${icon} ${file.name}
</div>

</a>

</div>
`;

});

document.getElementById("driveUpdates").innerHTML = html;

});

</script>

</body>
</html>
