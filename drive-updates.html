<div id="driveUpdates" style="display:flex;flex-wrap:wrap;gap:15px;"></div>

<script>

const API_KEY = "AIzaSyAm1XgmFz2loEuBtfYb6778gwuFKhh8z-k";
const FOLDER_ID = "1MIE35z9EfbaacVMQLgyf6WaLPYctBOFs";

const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&fields=files(id,name,mimeType,thumbnailLink,createdTime)&orderBy=createdTime desc&key=${API_KEY}`;

fetch(url)
.then(res => res.json())
.then(data => {

 let html = "";

 data.files.slice(0,8).forEach(file => {

   let icon = "📄";

   if(file.mimeType === "application/vnd.google-apps.folder"){
     icon = "📁";
   }

   let thumb = file.thumbnailLink 
     ? `<img src="${file.thumbnailLink}" style="width:100%;height:120px;object-fit:cover;">`
     : `<div style="height:120px;display:flex;align-items:center;justify-content:center;font-size:40px">${icon}</div>`;

   html += `
   <div style="
        width:200px;
        border:1px solid #ddd;
        border-radius:8px;
        overflow:hidden;
        font-family:Arial;
        background:white">

        ${thumb}

        <div style="padding:10px">
          <a href="https://drive.google.com/open?id=${file.id}" target="_blank" style="text-decoration:none">
          ${icon} ${file.name}
          </a>
        </div>

   </div>
   `;

 });

 document.getElementById("driveUpdates").innerHTML = html;

});

</script>
